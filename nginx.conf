server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # ── Security & PWA headers ──────────────────────────────────────────────
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(self), notifications=(self)" always;

    # ── Gzip compression ────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain text/css text/xml text/javascript
        application/javascript application/x-javascript
        application/json application/xml application/rss+xml
        application/manifest+json image/svg+xml font/woff font/woff2;
    gzip_disable "MSIE [1-6]\.";

    # ── Service Worker: never cache, allow full scope ────────────────────────
    location = /sw.js {
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate";
        add_header Service-Worker-Allowed "/";
        add_header Content-Type "application/javascript";
        expires 0;
    }

    # ── Web App Manifest ────────────────────────────────────────────────────
    location ~* \.(webmanifest|manifest\.json)$ {
        add_header Content-Type "application/manifest+json";
        add_header Cache-Control "no-cache";
    }

    # ── Apple Touch Icons (iOS "Add to Home Screen") ─────────────────────────
    location ~* apple-touch-icon {
        add_header Cache-Control "public, max-age=86400";
        try_files $uri /assets/icon.png;
    }

    # ── Fonts: long-lived cache, CORS for iOS ───────────────────────────────
    location ~* \.(ttf|woff|woff2|eot|otf)$ {
        add_header Cache-Control "public, max-age=31536000, immutable";
        add_header Access-Control-Allow-Origin "*";
        access_log off;
    }

    # ── Static assets: aggressive caching ───────────────────────────────────
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|webp|avif|mp3|mp4|ogg)$ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
        access_log off;
    }

    # ── SPA fallback ─────────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }
}

